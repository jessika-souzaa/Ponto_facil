<!DOCTYPE html>
<html>
<head>
<title>Histórico</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

  <h1>Histórico de Registros</h1>

  <form method="GET" action="/historico" class="filtro-form">
    <div class="filtro-campos">
      <div class="filtro-grupo">
        <label>De</label>
        <input type="text" name="data_inicio" placeholder="dd/mm/aaaa"
               pattern="\d{2}/\d{2}/\d{4}" value="{{ data_inicio }}"
               onfocus="this.type='date'" onblur="if(!this.value) this.type='text'">
      </div>
      <div class="filtro-grupo">
        <label>Até</label>
        <input type="text" name="data_fim" placeholder="dd/mm/aaaa"
               pattern="\d{2}/\d{2}/\d{4}" value="{{ data_fim }}"
               onfocus="this.type='date'" onblur="if(!this.value) this.type='text'">
      </div>
      <button type="submit" class="btn-buscar">Buscar</button>
    </div>
  </form>

  <table>
    <tr>
      <th>Data</th>
      <th>Hora</th>
      <th>Tipo</th>
    </tr>
    {% for registro in registros %}
    <tr>
      <td>{{ registro[0] }}</td>
      <td>{{ registro[1] }}</td>
      <td>{{ registro[2] }}</td>
    </tr>
    {% endfor %}
  </table>

  <a class="voltar" href="/painel">Voltar ao painel</a>

</div>

</body>
</html>
